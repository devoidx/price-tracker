[mypy]
python_version = 3.10
ignore_missing_imports = true
disallow_untyped_defs = false
warn_return_any = false
no_implicit_optional = false
exclude = __pycache__

# SQLAlchemy 1.x column types are not understood by mypy without the plugin
# These errors are false positives from ORM attribute access
disable_error_code = arg-type, assignment, index, call-overload, union-attr

[mypy-playwright.*]
ignore_missing_imports = true

[mypy-apscheduler.*]
ignore_missing_imports = true

[mypy-passlib.*]
ignore_missing_imports = true

[mypy-jose.*]
ignore_missing_imports = true
